# .lsa.yaml — Living Spec Architecture configuration for this repo.
# Schema version: 1 (matches lsa plugin major version 0.x.y)
# See lsa/ARCHITECTURE.md §4.10 for the full schema.

constitution: .lsa/VISION.md
specs_root: .lsa/
mode: docs

modules:
  core:
    spec: .lsa/modules/core/spec.md
    artifact_paths:
      - core/skills/**/SKILL.md
      - core/knowledge/**/*.md
      - core/.claude-plugin/plugin.json
      - core/CLAUDE.md
      - core/README.md
      - core/VERIFICATION.md
      - core/tests/**/*.md
  lsa:
    spec: .lsa/modules/lsa/spec.md
    artifact_paths:
      - lsa/skills/**/SKILL.md
      - lsa/agents/**/*.md
      - lsa/knowledge/**/*.md
      - lsa/hooks/hooks.json
      - lsa/hooks/**/*.sh
      - lsa/.claude-plugin/plugin.json
      - lsa/ARCHITECTURE.md
      - lsa/README.md
  helper:
    spec: .lsa/modules/helper/spec.md
    artifact_paths:
      - helper/agents/**/*.md
      - helper/commands/**/*.md
      - helper/knowledge/**/*.md
      - helper/.claude-plugin/plugin.json
      - helper/README.md
      - helper/VERIFICATION.md
  management:
    spec: .lsa/modules/management/spec.md
    artifact_paths:
      - management/agents/**/*.md
      - management/skills/**/SKILL.md
      - management/knowledge/**/*.md
      - management/.claude-plugin/plugin.json
      - management/README.md
