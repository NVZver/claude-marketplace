# .lsa.yaml — Living Spec Architecture configuration for this repo.
# Schema version: 1 (matches lsa plugin major version 0.x.y)
# See lsa/ARCHITECTURE.md §4.10 for the full schema.

constitution: vision/VISION.md
specs_root: vision/specs/
mode: docs

modules:
  core:
    spec: vision/specs/modules/core/spec.md
    artifact_paths:
      - core/skills/**/SKILL.md
      - core/knowledge/**/*.md
      - core/.claude-plugin/plugin.json
      - core/CLAUDE.md
      - core/README.md
      - core/VERIFICATION.md
      - core/tests/**/*.md
  lsa:
    spec: vision/specs/modules/lsa/spec.md
    artifact_paths:
      - lsa/skills/**/SKILL.md
      - lsa/knowledge/**/*.md
      - lsa/hooks/hooks.json
      - lsa/hooks/**/*.sh
      - lsa/.claude-plugin/plugin.json
      - lsa/ARCHITECTURE.md
      - lsa/README.md
