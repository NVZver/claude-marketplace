# .lsa.yaml — Living Spec Architecture configuration for this repo.
# Schema version: 1 (matches lsa plugin major version 0.x.y)
# See lsa/ARCHITECTURE.md §3 for the full schema.

constitution: .lsa/VISION.md
specs_root: .lsa/
mode: docs

# Quality-gate script contract (see lsa/knowledge/quality-gate-contract.md).
# docs-mode structural probes: each key is a check name → a deterministic
# command. A check passes iff its command exits 0; verify / reconcile cite the
# command + exit code as the Rule-7 gate artifact instead of re-deriving grep
# recipes by hand. Pro-safe, local bash, zero model calls.
gate:
  docs-invariants: bash scripts/lint.sh
  citations: bash scripts/check-citations.sh
  links: bash scripts/check-links.sh
  project-map: bash lsa/scripts/project-map-check.sh
  tests: bash scripts/run-tests.sh

# Reconcile scenario-run count (lsa/skills/reconcile/SKILL.md Step 1).
# Default when the key is absent: 3 — pass = all 3 runs succeed (≥95% of 3 ⇒ 3/3).
# Escape hatch: raise for high-stakes epics; at a larger N, pass = ≥95% of runs.
reconcile:
  runs: 3

# manager:implement concurrency cap (manager/skills/implement/SKILL.md Step 4a).
# Default when the key is absent: 4 — at most 4 epic agents run at once
# (conservative vs. the vendor cap of ~8, manager/knowledge/parallel-dispatch.md §3).
# Escape hatch: raise toward the vendor cap for wide, provably-disjoint waves.
implement:
  concurrency: 4

# Model routing map (see lsa/knowledge/model-routing.md). Keys are Agent-dispatch
# surfaces; values are the tier the dispatcher passes as the Agent model parameter.
# Read at dispatch time — zero model pins ship in any plugin frontmatter (lint C8).
# Absent key OR a model the plan lacks ⇒ inherit (never a hard error). Floored
# surfaces (lsa:reconcile grader, lsa:delegate implementer, manager:implement
# fan-out) always resolve inherit even if named here. Only non-inherit entries are
# listed; every omitted surface runs inherit (= the session model, today's behavior).
#
# ONLY list a surface whose dispatcher actually reads this map and passes the
# model parameter. Wired today: manager:next / manager:check (via the shared
# roadmap-orchestration contract, manager/knowledge/roadmap-orchestration.md
# §"The contract" item 1 — cited by both skills) and lsa:delegate.verify-checkpoint
# (lsa/skills/delegate/SKILL.md §5). prompt-engineer.mechanical is intentionally
# absent — its agent-side resolver was reverted (cf3b78d), so it would be dead config.
routing:
  manager:next: sonnet
  lsa:delegate.verify-checkpoint: sonnet

modules:
  core:
    spec: .lsa/modules/core/spec.md
    artifact_paths:
      - core/skills/**/SKILL.md
      - core/knowledge/**/*.md
      - core/.claude-plugin/plugin.json
      - core/CLAUDE.md
      - core/README.md
      - core/VERIFICATION.md
      - core/tests/**/*.md
  lsa:
    spec: .lsa/modules/lsa/spec.md
    artifact_paths:
      - lsa/skills/**/SKILL.md
      - lsa/agents/**/*.md
      - lsa/knowledge/**/*.md
      - lsa/hooks/hooks.json
      - lsa/hooks/**/*.sh
      - lsa/scripts/**/*.sh
      - lsa/.claude-plugin/plugin.json
      - lsa/ARCHITECTURE.md
      - lsa/README.md
      - lsa/CORE.md
      - lsa/CHANGELOG.md
  manager:
    spec: .lsa/modules/manager/spec.md
    artifact_paths:
      - manager/agents/**/*.md
      - manager/skills/**/SKILL.md
      - manager/knowledge/**/*.md
      - manager/.claude-plugin/plugin.json
      - manager/README.md
  prompt-engineer:
    spec: .lsa/modules/prompt-engineer/spec.md
    artifact_paths:
      - prompt-engineer/agents/**/*.md
      - prompt-engineer/commands/**/*.md
      - prompt-engineer/knowledge/**/*.md
      - prompt-engineer/.claude-plugin/plugin.json
      - prompt-engineer/README.md
      - prompt-engineer/VERIFICATION.md
      - prompt-engineer/tests/**/*.md
  observer:
    spec: .lsa/modules/observer/spec.md
    artifact_paths:
      - observer/skills/**/SKILL.md
      - observer/knowledge/**/*.md
      - observer/.claude-plugin/plugin.json
      - observer/README.md
      - observer/CHANGELOG.md
      - observer/tests/**/*.md
