    priority: Should
    status: shipped
    status_detail: |
      shipped — merged to `main` via PR #52 (`ba6f9d1`, 2026-06-17) — all 4 epics ✅: E1 safety core (core 0.14.0 + lsa 0.18.0 + manager 0.11.0), E2 fleet dispatcher (manager 0.12.0), E3 semi autonomy (manager 0.13.0 + lsa 0.19.0 `autonomy:`), E4 fleet roll-up + auto autonomy (manager 0.14.0); conformance under `features/2026-06-17-parallel-agent-delivery-epic-{1,2,3,4}/`. **E1+E2 (`manual`) is the validated slice; E3+E4 (`semi`/`auto`) are built but NOT enabled — default stays `manual` until dogfooding proves it safe (pitch appetite `:26`).** Remaining outcome: dogfood the `manual` fleet on real backlog work, then decide whether to enable `semi`/`auto`
    notes: |
      User-proposed 2026-06-14 (CC: Manager). Run X agents in parallel on the roadmap/backlog, merging to `main` safely. Fixes two reported failures: (a) hallucinated completion ("Done, in prod" when the merge/migration never ran — the measured S7 "Inaccurate Self-Reporting" failure mode) and (b) zero transparency ("Done, you can check" instead of a grouped change report). Core idea: "done" is a predicate a deterministic, **agent-inaccessible** gate proves, never a claim — so the gate output *is* the report. Components: layered quality gate (local script + GitHub merge-queue/required-checks, the "not-rocket-science rule") · `lsa:reconcile` spec-conformance wired as a required check run by an independent context (the differentiator — no other tool gates merges on "all of and only what was asked") · configurable autonomy (manual/semi/auto, default manual) · evidence-over-assertion roll-up reusing the `lsa-stage-reports` contract. Likely a new optional `fleet` plugin (depends on core+lsa+manager). Pitch: [parallel-agent-delivery](pitches/parallel-agent-delivery.md).
