  - slug: library-spec-cache-for-top-3-5-libraries
    title: |
      Library-spec cache for top 3–5 libraries
    priority: Could
    status: in_progress
    status_detail: |
      epic 1 (format-and-staleness-gate) shipped — lsa v0.31.0, PR #81. epic 2 (github-actions-pin) shipped — PR #82, .lsa/libs/actions-checkout.md registered, gate green, no plugin bump. Both merged into chore/project-quality-improvements. epic 3 (conditional-read-precedence) not started.
    notes: |
      Adopted via Tech Picture 2026-05-20 — see §"Tech Picture adoption — 2026-05-20" #2. Shaped 2026-07-19 as `pinned-library-specs`. **Posture: net-new capability, OUTSIDE the consolidation posture set 2026-07-16 — owner approved as a bounded exception for this item only; consolidation remains in force for everything else.** **Dogfood target revised 2026-07-19 at the specify gate:** the original target (the Claude Code platform surface) was cancelled — it has no manifest or lockfile, so its staleness check would report `[cannot verify]` and exit non-zero *permanently*, and since the check lives in the `gate:` block that means **every `lsa:verify` in this repo would return NOT-GROUNDED forever** (chain: `lsa/skills/verify/SKILL.md:42` → `scripts/gate.sh:86`). Three separately-approved decisions (Fork 1's target + Fork 3's gate placement + rabbit hole 4's never-green rule) combined into a self-inflicted blocker that none of them revealed alone. Replaced by **`actions/checkout@v4`** — the repo's only version-pinned external dependency (`.github/workflows/lint.yml:12`), which has a real in-repo manifest, so the assertion is checkable and the gate can go green. Honest limitation, encoded as a requirement: `@v4` is a floating major tag, so this detects *our* declaration changing (a `@v5` bump), not upstream releases within v4 — weaker than a true lockfile, and the pinned spec must say so. Epics: `pinned-library-specs/{format-and-staleness-gate, github-actions-pin, conditional-read-precedence}`. Pitch: [pinned-library-specs](pitches/pinned-library-specs.md).
