  - slug: lsa-gate-prompts-must-be-concrete-no-ids
    title: |
      LSA gate prompts must be concrete (no IDs, no jargon, must-decide only)
    priority: Must
    status: shipped
    status_detail: |
      shipped — core v0.5.0 (Rule 5) + core v0.5.1 (Rule 5 promoted to *prompt voice*) + lsa v0.6.1 (gate-prompt scaffolding)
    notes: |
      Per user observation 2026-05-21 — dominant reason `lsa-specify` "takes forever". Quote: *"I have no IDEA what it means…wording is too…i don't know, it just means nothing to me…I want concrete questions to make decisions with clear problem to solve. I do not give a fuck about minor things."* Three fix-points all landed: (1) **No opaque IDs in user-facing prompts** + (2) **Strip project jargon** + (3) **Surface only must-decide** — `core/output` Rule 5 (Concrete — prompt voice; `core` v0.5.0/v0.5.1) names all three; `lsa` v0.6.1 (Bundle A, 2026-05-22) wires explicit subject-voice scaffolds into the Present block of `lsa-specify` Steps 2/4/5/6, `lsa-plan` Step 5, `lsa-init` Step 2 (brownfield), so the picker question names the feature subject not the Gate ID.
