    content: |
      ## 2026-06-17 backlog detail — Parallel-agent-delivery build epics (Epics 1–4)

      `READY` — four build epics decomposed 2026-06-17 from the approved pitch (`.lsa/pitches/parallel-agent-delivery.md`) + its solution design (`.lsa/research/parallel-agent-delivery-solution-design.md`). Epic 0 (prior-art spike) shipped — research doc delivered. The solution design's **Design refinement** (`solution-design.md:82-123`) is the binding home decision where it conflicts with the pitch's "new `fleet` plugin" line: **no new plugin** — orchestration re-homes to `manager`, the independent grader to `lsa`, the done-rule to `core`; GitHub/git provide isolation (worktrees), enforcement (required checks), serialization (merge queue). Epics are ordered by dependency and by the pitch Appetite's slicing (`parallel-agent-delivery.md:26`): Epic 1 ships the safety core at `manual` autonomy first; Epics 2–4 build on it, each gated on the prior proving safe in dogfooding.

      **Convergence target.** All four epics land on the integration branch `feature/parallel-agent-delivery` (created off `main` 2026-06-17); the human owns the final merge of that branch to `main` — the same human-owned-merge-to-main boundary the pitch itself defines (`parallel-agent-delivery.md:48` no-go #2). Per-plugin SemVer + CHANGELOG + README deltas land with each epic per the standing discipline.

      ### 1. Parallel-agent-delivery — Epic 1: Safety core (done-predicate rule · isolated reconcile grader · serialized merge) at `manual` autonomy

      - **Problem.** The agent that writes code is also the one that judges it, and nothing forces a "done" claim to be true — partial/unverified work gets reported complete (the measured S7 "Inaccurate Self-Reporting" mode, pitch `:12`), and red code can reach `main`. This is the first shippable slice per the pitch Appetite (`:26`): the verifiable-done rule + an independent grader + a serialized merge that keeps `main` always-green, at `manual` autonomy only.
      - **Priority.** P0 (**Must**). The safety core every later epic rests on. Re-homes solution-design components 1, 3, 6 (`solution-design.md:62-69`).
      - **Subtasks.**
        1. **core** — new always-on content rule in `core/skills/ground-rules/SKILL.md`: an agent may report a state (`merged @ <sha>`, `migration applied`, `tests green`, `deployed`) only when a deterministic, agent-inaccessible gate proved it AND the report cites the gate artifact; anything unproven is reported `attempted`/`unknown` with evidence attached. Cites memory `feedback_verifiable_done_predicate.md` + evidence S7 / Claude best-practices (`solution-design.md:52-56`). Update `core/CLAUDE.md` always-on fragment + bump `core` SemVer + CHANGELOG + README.
        2. **lsa** — wire `lsa:reconcile` as an independent spec-conformance grader run in a context with no write access to the tests/gate it grades; acceptance `.feature` scenarios + gate config are not editable within the same epic's change (the unwritable-by-the-work grader — the differentiator, `solution-design.md:18`). Define the repo-local **quality-gate script contract** (per-check name → command: lint · typecheck · test · migration-applied · build) consumed as required-check slots. Bump `lsa` SemVer + CHANGELOG + README.
        3. **manager** — serialized-merge step (GitHub merge-queue `merge_group` wiring when available, else local rebase-onto-main + re-gate fallback), plus the rule that **only the serialized merge step writes `.lsa/roadmap.md` status** (agents propose done; the merge step commits it — defends the shared-roadmap race, pitch rabbit-hole 8 `:43`). Bump `manager` SemVer + CHANGELOG + README.
        4. Fix pitch defect **O1** surfaced by Epic 0 (`features/2026-06-14-parallel-agent-delivery-epic-0/conformance.md:20-23`): already corrected in the pitch body (`parallel-agent-delivery.md:12` now cites `arxiv 2406.10162`); verify no stale `2505.19955` reference remains in any live artifact.
      - **Covers.** Pitch success criteria 1, 2 (partial — serialized merge), 4 (`manual` default only); solution-design Epic 1 (`solution-design.md:75`).

      ### 2. Parallel-agent-delivery — Epic 2: Fleet dispatcher (`manager:implement` engine + disjoint-epic decomposer)

      - **Problem.** We need to run N agents on disjoint backlog epics at once without colliding on files, and converge each to the integration branch as a reviewable PR unit. The `manager:implement` read-only preview stub shipped (manager v0.10.0, PR #50) — this epic promotes it to the dispatch engine.
      - **Priority.** P0 (**Must**). Re-homes component 2 (`solution-design.md:20-27`). Blocked by Epic 1 (needs the gate + done-rule the dispatcher enforces).
      - **Subtasks.**
        1. Promote `manager:implement A, B, C` from preview to execution: compute the dependency-ordered **wave plan** → propose → confirm → run (parallel within a wave, sequential across waves), per the worked example `solution-design.md:109-117`. `--sequential` / `--parallel` overrides.
        2. **Disjoint-epic decomposer** — split a backlog into epics that don't *logically* overlap (vendors isolate file edits; none guarantee epic-logic disjointness — the real net-new risk we own, `solution-design.md:25`).
        3. Dispatch policy: one worktree + branch + agent + PR per epic (Claude Code `isolation: worktree` / `EnterWorktree`), configurable concurrency cap (default ~4), teardown baked into the gate (worktree cleanup footgun, pitch rabbit-hole 2 `:37`).
        4. Bump `manager` SemVer + CHANGELOG + README.
      - **Covers.** Pitch success criterion 2 (N agents, disjoint epics, isolated worktrees); solution-design Epic 2 (`solution-design.md:76`).

      ### 3. Parallel-agent-delivery — Epic 3: Semi autonomy (auto-merge on green)

      - **Problem.** Different users/situations want different amounts of human-in-the-loop; full-auto must never be the silent default. `manual` (Epic 1) is the floor; `semi` adds auto-merge once the gate is green.
      - **Priority.** Should. Re-homes component 4 partial (`solution-design.md:38-44`). Blocked by Epic 2; gated on Epic 1 proving safe in dogfooding (pitch `:26`).
      - **Subtasks.**
        1. `.lsa.yaml` autonomy knob `manual | semi | auto`, default `manual`.
        2. Bind `semi` = auto-merge on green (the gate passes → the serialized-merge step lands the tested SHA without a human prompt; human still owns `auto`/deploy).
        3. Bump the owning plugin(s) SemVer + CHANGELOG + README.
      - **Covers.** Pitch success criterion 4 (autonomy as a config knob, `semi` level); solution-design Epic 3 (`solution-design.md:77`).

      ### 4. Parallel-agent-delivery — Epic 4: Fleet roll-up + `auto` autonomy (deploy + healthcheck)

      - **Problem.** Runs end with "Done, you can check" instead of evidence; and `auto` (full SDLC incl. deploy) is still unbuilt. The roll-up makes the gate output *the* report; `auto` extends the green gate to deploy + healthcheck before "deployed" may be claimed.
      - **Priority.** Should. Re-homes components 5, 4 (`solution-design.md:46-50, 38-44`). Blocked by Epic 2. **Hard dependency:** the `lsa-stage-reports` base report contract must ship first (roadmap row "Per-stage LSA reports", currently backlog — pitch rabbit-hole 7 "one report contract" `:42`).
      - **Subtasks.**
        1. Fleet-scope roll-up layered over one `lsa-stage-reports` stage report per agent: per-agent attribution · per-epic gate verdicts · proven facts (checks passed, SHA, healthcheck) · open items. Files grouped by Conventional-Commits `type(scope)`.
        2. `auto` autonomy = full SDLC incl. deploy + healthcheck, still gated by the same green gate; a rollback/revert step is defined (pitch rabbit-hole 6 `:41`).
        3. Bump the owning plugin(s) SemVer + CHANGELOG + README.
      - **Covers.** Pitch success criteria 3 (structured roll-up), 4 (`auto` level); solution-design Epic 4 (`solution-design.md:78`).
