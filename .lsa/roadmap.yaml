  - slug: core-output-discipline-enforcement-askuserquestion-output-length
    title: |
      `core/output` discipline enforcement (`AskUserQuestion` + output length)
    priority: Should
    status: shipped
    status_detail: |
      shipped — core v0.5.1 (fix-points #1 + #2); #3 deferred
    notes: |
      Per user observations 2026-05-21 — two `core/output` rules routinely skipped in practice: (a) Principle 9 (`.lsa/VISION.md:63` *"In Claude Code: `AskUserQuestion` for decisions"*) — agents render text `[a]/[b]/[c]` blocks where the native picker was available; (b) "Minimal" + "below-the-fold" — agents push 60+ line responses with tables + worked-example + decision block in one turn, forcing the user to scroll-and-skim. Fix-points #1 (elevate both rules to always-on bullets in `core/CLAUDE.md`) and #2 (tighten `core/output` Rule 2 to mandate "1–1.5 screen budget; split into turns; pull don't push") landed in `core` v0.5.1 (Bundle A, 2026-05-22). Fix-point #3 (lints: text-decision-block-where-picker-available, response-line-budget) deferred to the v0.3.0 Self-eval harness row below.
  - slug: source-attribution-provenance-for-agent-responses
    title: |
      Source-attribution provenance for agent responses
    priority: Should
    status: shipped
    status_detail: |
      shipped — core v0.5.4 (file-load trace, supersedes the v0.5.3 single-line `[plugin:skill]` marker)
    notes: |
      Per user request 2026-05-22 — without provenance, the user couldn't tell which marketplace skill shaped a given response. **v0.5.3 (superseded)** added a single `[plugin:skill]` label at the top of every response; it did not survive in practice ("markers do not work"). **v0.5.4 (current)** replaces the single label with a per-file trace directive hardcoded at the top of every marketplace instructional file: on load, the agent prints `=============== [<file>] [<plugin>] ===============` verbatim, one line per loaded file, in load order, before the response body. Hardcoded directive in each file enforces itself (the file's own first line is the print), instead of relying on the agent to remember a session-wide rule. Sibling adoption: `lsa` v0.6.4 (9 files) + `helper` v0.2.1 (5 files).
