  - slug: standards-conformance-agents-md
    title: |
      Make tool-agnosticism true and independently verifiable (AGENTS.md + Agent Skills spec)
    priority: Must
    status: shipped
    status_detail: |
      shipped — core v0.21.1. epic 1 (agents-md-canonical) PR #77, epic 2 (standards-claim) PR #80, both merged into chore/project-quality-improvements. **Important correction found during epic 2:** the pitch assumed 20/20 Agent Skills spec conformance; running the actual skills-ref reference validator found 13/20 (7 skills fail on invalid YAML — unquoted colon+space in description). Recorded honestly in core/VERIFICATION.md, independently reproduced by the reconciling orchestrator. README/VISION claims corrected to "13/20 strict / 20/20 our own checks", not an unqualified claim. Follow-up backlogged below (agent-skills-strict-yaml-conformance).
    notes: |
      Approved 2026-07-19. Closes the distribution-layer half of the tool-agnosticism claim the 2026-07-19 pulse check found "real at the format layer but unproven at the distribution layer". **A:** ship `/AGENTS.md` (Linux Foundation / Agentic AI Foundation standard, 60k+ projects, read by Cursor / Copilot / Codex / Devin / Zed / Junie / Aider / goose) as canonical, with `/CLAUDE.md` reduced to an `@AGENTS.md` import — Claude Code does not read AGENTS.md natively (anthropics/claude-code#6235, open), so both must coexist; a new lint C16 fails if the discipline text appears in two files. **B:** claim the Agent Skills open standard (agentskills.io) we already silently satisfy — verified 20/20 skills, name↔dir matches, longest body 192 lines vs the spec's recommended 500; `lint.sh` C7/C9 already enforce the spec's own constraints while citing a vendor doc for authority. Proof is a one-off `skills-ref validate` run cited in `VERIFICATION.md`; the `gate:` block stays npm-free. JSON Schema / SchemaStore excluded as net-new capability (Fork C). **Runs before `cursor-equal-support`** — re-aiming that item is free while it is backlog. Epics: `standards-conformance-agents-md/{agents-md-canonical, standards-claim}` (decomposed 2026-07-19). **Fork D sub-item revised:** the optional per-skill `license` field is DROPPED — optional in the spec, absent from all four success criteria, does not affect `skills-ref validate`, and would duplicate a root-level fact into 20 files across four `artifact_paths` (four SemVer bumps + four CHANGELOG entries + four module specs) — the exact drift rabbit hole 1 builds C16 to prevent; `metadata` stays unset per Fork D. Verified scope: root `/CLAUDE.md`, `/README.md`, `/AGENTS.md`, `.lsa/VISION.md` and `scripts/lint.sh` are in NO plugin's `artifact_paths`, so the whole pitch costs exactly **one** SemVer bump (`core`, epic 1) rather than five. Lint C16 is NOT folded into `restore-tracked-metrics-harvest/reconcile-emit-guard` (C17) or `pinned-library