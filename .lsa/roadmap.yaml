  - slug: observable-grader-independence
    title: |
      Observable grader independence — record the model axis
    priority: Could
    status: deferred
    status_detail: |
      DROPPED 2026-07-19 at the specify gate — architecturally unreachable, not deprioritized
    notes: |
      **DROPPED 2026-07-19 — do not re-shape without reading this.** The spec was written in full (14 requirements, `.lsa/features/observable-grader-independence/cross-model-verdict/`, retained as the record) and is internally correct, but the feature it specifies cannot work. `lsa:delegate` and `lsa:reconcile` are BOTH in the floored set (`lsa/knowledge/model-routing.md` §"Resolution algorithm" step 1 — each "resolve `inherit` and stop"), so they can never differ in tier. Consequence: an Agent-dispatched implementer always yields `cross-model: no`, an external implementer is unobservable and yields `unknown`, and **`cross-model: yes` is unreachable** — the feature would ship a three-valued field where one value can never occur. Worse, `require` mode would FAIL every agent-dispatched run, which is "forbid agent-dispatched implementation", not "opt into rigor". Routing *up* cannot rescue it either: the tier vocabulary is `inherit | sonnet | haiku` with nothing above `inherit`, and hardcoding `opus` is banned (`.lsa/standards/code.md:52`). The founding premise — that cross-model grading already happens unrecorded — was wrong, carried from `.lsa/observations/2026-07-19-sdd-competitive-pulse-check.md` through pitch shaping and decomposition unchallenged, and caught only at `specify`. **The only path to a reachable `yes`** is having `delegate` ask the user to declare an external implementer's model (the pitch's rejected Fork 3b) — that requires reopening the pitch, not just the spec. The competitive gap vs Flow-Next remains open and is documented in the pulse check §5.2. Original approval: 2026-07-19. Records implementer-vs-grader model on the reconcile verdict (`cross-model: yes|no|unknown`) with opt-in `reconcile.cross_model: require`. Never re-tiers the floored grader — the floor stays dominant over any cross-model preference, closing the contradiction that made the 2026-07-19 pulse check's own §6 item 2 fix unimplementable. Docs-only, no new script. Epics: `observable-grader-independence/{cross-model-verdict}`. Pitch: [observable-grader-independence](pitches/observable-grader-independence.md).

  - slug: agent-skills-strict-yaml-conformance
    title: |
      Fix 7 skills' invalid-YAML frontmatter (Agent Skills spec strict conformance)
    priority: Should
    status: backlog
    notes: |
      Found 2026-07-20 during `standards-conformance-agents-md/standards-claim`: running the actual `skills-ref` reference validator (https://agentskills.io/specification) over all 20 shipped skills found **13/20 pass, 7 fail** — not the 20/20 the parent pitch assumed. Root cause, verified by direct byte inspection: the 7 failing skills' `description:` frontmatter is an unquoted YAML plain scalar containing a mid-string `: ` (colon immediately followed by a space) — e.g. `lsa/skills/discover/SKILL.md:3` (`"...a spec will rest on. Output: intent + cited facts..."`). Per the YAML spec a colon+space inside a plain scalar is invalid without quoting; Claude Code's own frontmatter parser tolerates it (all 7 skills trigger correctly in practice), but the strict reference validator correctly rejects it. Failing skills: `core/skills/ground-rules`, `lsa/skills/{discover,init,reconcile,revise-constitution,specify,verify}`. Fix: quote the `description:` value (or rephrase to avoid the mid-string colon) in each of the 7 files — a mechanical, low-risk change, but touches `*/skills/**/SKILL.md` under 2 plugins' `artifact_paths` (`core`, `lsa`), so needs a version bump + CHANGELOG entry per plugin, plus a re-run of `skills-ref validate` transcribed into `core/VERIFICATION.md` to update the 13/20 claim. Not folded into `standards-claim` — that epic is citation-only, no skill content changes, per its own R7/Out-of-Scope. Evidence: `core/VERIFICATION.md` §"Agent Skills spec conformance".

