appendix:
  - section: appendix-1
    content: |
      ## Tech Picture adoption — 2026-05-20

      `READY` — three recommendations adopted from the 2026-05-20 Tech Picture analysis. Each passes the four credo tests: **Simple · Direct · Factual · Make-you-own-it**. Items rejected or deferred in that analysis are not promoted here. Status of each entry remains `backlog` in the table above until a plan file under `.lsa/plans/` is opened.

      ### 1. EARS notation in the `requirements.md` AC block

      - **Name.** EARS notation, scoped to the acceptance-criteria sub-block of `lsa-specify`'s `requirements.md`. GWT (Given/When/Then) stays for the surrounding narrative.
      - **Source.**
        - In-repo verdict: `.lsa/VISION.md:199` — *"Verdict: keep GWT for the spec narrative; add EARS only in the acceptance-criteria block, since that's what the verifier traces to code. A tightening, not a replacement."*
        - EARS five-pattern definition: `.lsa/VISION.md:198` — *"EARS has five fixed patterns: Ubiquitous ('shall always'), Event ('When X… shall'), State ('While X… shall'), Optional ('Where feature X… shall'), Unwanted ('If X happens, then… shall'). You cannot write 'handles errors gracefully' in EARS — no pattern accepts a vague line."*
        - External origin: [Alistair Mavin — EARS official guide](https://alistairmavin.com/ears/); cross-industry adoption (Airbus, NASA, Rolls-Royce) per [Jama Software — Adopting EARS Notation](https://www.jamasoftware.com/requirements-management-guide/writing-requirements/adopting-the-ears-notation-to-improve-requirements-engineering/) [unverified — claim sourced from 2026-05-20 search summary, not verified against the source page].
      - **Description.** Inside `requirements.md`, the AC sub-block changes from free-form GWT prose to a list of EARS one-liners — one behavior per line, each keyed to a precondition/trigger. The verifier (`lsa-verify`) then traces every code change to a specific AC line; one EARS line maps to one test in `test-suites.md`.
      - **How it supports the credo.**
        - **Simple.** Five fixed patterns. No formal modeling language, no new tooling.
        - **Direct.** One line = one test. The verifier reads it without interpretation.
        - **Factual.** EARS rejects un-testable phrasing — *"handles errors gracefully"* cannot be written.
        - **Make-you-own-it.** Forces the human to name the trigger or precondition; the agent cannot paper over the gap with vague words.

      ### 2. Pinned library-spec cache for top 3–5 dependencies

      - **Name.** Pinned library specs under `.lsa/libs/<lib>.spec.md`. Bounded to the 3–5 most-used external dependencies; everything else stays reactive (fetched on demand by `lsa-discover`).
      - **Source.**
        - In-repo verdict: `.lsa/VISION.md:217` — *"Verdict: do NOT build a 10,000-spec registry — that's their product. But write a pinned spec once for your 3–5 most-used libraries. It's a module spec pointed at an external dep. Everything else stays reactive."*
        - Comparable (the product NVZver deliberately does not replicate): [Tessl Skills Registry](https://tessl.io/blog/my-coding-agent-needed-a-package-manager-for-its-own-brain-and-i-gave-it-one-using-a-skills-registry/) — 10k+ community-curated library specs distributed as MCP tiles.
      - **Description.** Each pinned spec is structured as a module spec whose target is an external library at a specific version. `artifact_paths` covers no in-repo files; the spec is the contract the agent reads before any call into that library. Updates are human-authored on a version bump — never auto-fetched, never imported from a community registry.
      - **How it supports the credo.**
        - **Simple.** Bounded scope (3–5 files). No registry build, no fetcher, no cache invalidation logic.
        - **Direct.** Agent consults one local file before any API call into the library. No per-feature re-fetch, no MCP round trip.
        - **Factual.** The version pin closes the LLM's guess on API shapes; a drift between pin and library version is an editable spec line, not a silent runtime bug.
        - **Make-you-own-it.** The human writes the pin and updates it on every bump; the system refuses to auto-import a stranger's library spec.

      ### 3. Diagonal cross-artifact analysis at `lsa-specify` User Verification 2 (formerly Gate 2)

      - **Name.** A diagonal cross-artifact coverage check inside `lsa-specify` User Verification 2 (renamed from Gate 2 in `lsa` v0.6.2), extending the existing AC→Journey check to the full set of artifact pairs.
      - **Source.**
        - Existing in-repo precedent (the seed): `.lsa/plans/2026-05-20-credo-rollout-plan.md:243-246` — sample S6 already does AC→Journey coverage: *"AC coverage check: / - AC1 → Journey 1 (happy path)  ✓ / - AC2 → Journey 2 (expired-link path)  ✓ / - AC3 → Journey 1, step 4 (session reset)  ✓"*.
        - Inspiration: [GitHub Blog — Spec-driven development with AI](https://github.blog/ai-and-ml/generative-ai/spec-driven-development-with-ai-get-started-with-a-new-open-source-toolkit/) — the Spec-Kit toolkit ships *"quality checklists, and cross-artifact analysis"* between phases [unverified — claim sourced from 2026-05-20 search summary, not verified against the source page].
      - **Description.** Inside User Verification 2, the coverage check is extended from AC→Journey only to four diagonal pairs: AC→Journey, Journey→Design, Design→Contract, Contract→test-suites. Each row is a one-line citation between two artifact lines (e.g., `Design §"Token storage" ↔ Contract §"reset_tokens"`). When a row fails, the Verification surfaces the conflict as a Rule 6 decision block (`[a] revise AC / [b] revise Design / [c] custom`) — the system never auto-resolves.
      - **How it supports the credo.**
        - **Simple.** One tabular gate row per artifact pair. Same shape as the existing AC→Journey check, repeated for three more diagonals.
        - **Direct.** Verdict-first per Rule 7; the human's eye lands on `✗` rows first; passing rows collapse below the fold.
        - **Factual.** Every row cites the two specific artifact lines being compared — no aggregated "looks good".
        - **Make-you-own-it.** Conflicts surface as explicit options with outcomes (Rule 6); the agent refuses to pick which artifact "wins". The human owns the reconciliation.

  - section: appendix-2
    content: |
      ## 2026-05-24 backlog detail

      `READY` — two backlog rows added 2026-05-24 from user feedback on LSA usability.

      ### 1. LSA command rename + flow simplification

      - **Problem.** LSA command names are confusing in three ways: (a) the `lsa:lsa-*` double-prefix stutter makes commands verbose and hard to scan; (b) the correct workflow order isn't obvious from the names — users have to ask Helper to guide them; (c) `lsa-specify` and `lsa-discover` are separate commands with an unclear relationship, and `lsa-sync` sounds like a code-to-spec catch-up when it's actually spec-to-spec promotion.
      - **Example.** User 2026-05-24: *"While using it, I got always confused what each command does and what's the correct order of the command. I miss lsa:discover → lsa:plan → lsa:implement → lsa:verify. Right now, I always have to ask helper to guide me."*
      - **Decisions confirmed 2026-05-24:**
        1. **Drop `lsa-` prefix** from all skill file names → commands become `lsa:discover`, `lsa:plan`, `lsa:verify`, etc.
        2. **Merge `lsa-specify` + `lsa-discover`** into a single `lsa:discover` with three internal phases: specify (user describes intent) → discover (agent reads codebase, infers answers) → confirm (user approves).
        3. **Drop `lsa-sync` entirely.** Feature specs are the permanent record — no promotion into module specs. The audit (2026-05-24) confirmed `lsa-sync` was a spec-to-spec operation (not code-to-spec), but the promotion step is unnecessary overhead. Module-spec role may need rethinking later.
        4. **`lsa-reconcile` stays as exception-path only** — for unavoidable cases where code changed without a spec (the code-first exception to the spec-first default).
      - **Expected Output.** Main flow (Standard and Extended): `lsa:discover` → `lsa:plan` → `lsa:implement` → `lsa:verify`. Four commands, clear order, no stutter. Utility commands: `lsa:init`, `lsa:reconcile`, `lsa:revise-constitution`. Every command has a clear short description stating what is required before running and what will be the output. Touches: all LSA skill file names + `plugin.json` + `core/CLAUDE.md` + `.lsa/VISION.md` + both READMEs + both module specs + `CONTRIBUTING.md` + `lsa/ARCHITECTURE.md`.

      ### 2. Planning quality: `lsa-plan` must enforce TDD in every epic

      - **Problem.** `lsa-plan` generated implementation epics that entirely skipped TDD — no failing-test-first step, no test-then-implement cycle. TDD is a non-negotiable discipline in this project; a plan that omits it is a critical bug because downstream implementation follows the plan's structure and will skip tests too.
      - **Example.** User 2026-05-24: *"Planning quality is bad: it entirely skipped TDD. This is a critical bug, it must never happen."*
      - **Expected Output.** Every epic produced by `lsa-plan` includes an explicit test-first step before the implementation step — write a failing test that encodes the acceptance criterion, then implement to make it pass. The plan template or skill body must enforce this structurally so it cannot be omitted. Touches: `lsa/skills/plan/SKILL.md` (epic template / step scaffolding).

  - section: appendix-3
    content: |
      ## 2026-05-22 backlog detail

      `READY` — six backlog rows added 2026-05-22 from this session's user notes. Each carries the **Title / Problem / Example / Expected Output** shape; remaining implementation details get refined when the row is converted to a task. Rows are independent unless noted, so they can be picked up in parallel.

      ### 1. Refactor Helper from command-router to assistant

      - **Problem.** Helper is a dispatcher: present a picker → user picks → Helper fires a slash command. There is no goal-understanding, no reasoning, no actual assistance. Every interaction is forced through a multiple-choice gate even when the user asked a direct question, and the answer never goes through Helper's own voice.
      - **Example.** User 2026-05-22: *"Helper does not try to help, just tries to run a command without any reasoning behind. It should take care of the user, communicate with them, understand their goal and try to assist."* The verbal-coined name in this session: Helper-as-phone-tree.
      - **Expected Output.** Helper's default flow leads with goal-understanding and a direct cited answer; dispatching a slash command becomes the *outcome* of help, not the substance. The first turn after any user question is a cited answer (with `file:line`) plus, at most, one optional closing offer — never a mandatory picker. `helper/skills/helper/SKILL.md` Steps reflect this priority. Rows #2 and #3 likely fall out as side effects.

      ### 2. Helper fast-path for onboarding questions

      - **Problem.** Onboarding-flavored questions (*"how do I install / start / use X"* / *"what is Y"*) trigger Helper's full research loop (deep grep, context7 docs) even when the answer is sitting in a top-level README with a `file:line` citation. The user pays a multi-minute latency penalty for a question that should resolve in seconds.
      - **Example.** *"how do I get started with LSA"* → Helper took ~3 minutes (user-reported, 2026-05-22). The answer lives in `README.md` "Default plugins" (3-line install block) and `lsa/README.md` "Depends on" (1 paragraph) — total reading time well under a minute.
      - **Expected Output.** When a question matches an onboarding pattern (install / start / what-is-X / how-do-I-run), Helper short-circuits to a README excerpt with `file:line` citation in seconds. Deeper research kicks in only when the README doesn't cover the question. Pattern classifier lives in `helper/knowledge/onboarding-fast-path.md`; Step 1.5 in `helper/agents/helper.md` invokes it.

      ### 3. Audit + tighten `AskUserQuestion` call sites (Helper + LSA)

      - **Problem.** Helper and LSA call `AskUserQuestion` reflexively where no real decision needs to be made — to clarify what the user "really meant" when the question was clear, to offer three phrasings of the same answer, to confirm the user wants the thing they just asked for. Each unnecessary picker is a context switch that blocks the answer. This is *orthogonal* to the existing `core/output` Principle 9 (`.lsa/VISION.md:63`), which governs *which primitive to use when asking*; this row covers *whether to ask at all*.
      - **Example.** User 2026-05-22: *"AskUserQuestion overuse. Instead of quickly reply to user's question helper as well as the entire LSA start asking questions even when there's no need for that."* Concrete failure mode: a question with one clearly best answer (e.g., *"how do I install X"*) gets met with a 4-option picker for *"what do you want to know about X"* before the answer arrives.
      - **Expected Output.** Every `AskUserQuestion` call site in `helper/` and `lsa/skills/**/SKILL.md` passes the test *"is there a genuine fork the agent cannot resolve from context?"* — if no, replaced with a direct cited answer plus at most one optional closing offer. Real forks (destructive choices, two valid architectures, missing info the agent can't infer, per-row triage) keep their pickers. The relationship to Principle 9 is preserved: when a genuine fork exists, `AskUserQuestion` remains the substrate-native primitive.

      ### 4. LSA: what-and-why preamble on every verb-headline

      - **Problem.** LSA's action headlines (the verdict labels defined in [`core/knowledge/output-vocabulary.md`](../core/knowledge/output-vocabulary.md) §"Verdicts" — the canonical 10-verdict marketplace vocabulary) assume the user shares LSA's internal vocabulary (module, epic, gate, manifest, drift, reconcile). For users without that vocabulary — including collaborators on downstream projects — the headline is opaque: they can see *that* LSA did something, but not *what* or *why it matters to them*.
      - **Example.** `PROPOSED: 3 modules inferred for TripAnchor` followed by a list. User 2026-05-22: *"I want LSA always provide a short explanation of what it's doing and why. For example, I would never guessed what the 'PROPOSED: 3 modules inferred for TripAnchor. ...' mean and why I'd need it."* Working positive template from the same session (`lsa-init` brownfield): *".lsa.yaml missing → without it I would rescan src/ on every step"* — concrete consequence in the user's frame, not LSA jargon.
      - **Expected Output.** Every verb-headline in `lsa/skills/**/SKILL.md` is preceded by a one-sentence preamble that names (a) *what LSA is doing*, in plain English, in the user's frame, and (b) the *concrete consequence* if the user does not act. Format: `<context sentence>. <verb-headline + details>.` A bare verb-headline is not acceptable. Spans all 8 LSA skill bodies.

      ### 5. Show actual changes inline (LSA / Core / Helper)

      - **Problem.** Skills routinely say *"I added X to file Y"* or *"I marked OQ5 as resolved"* without quoting the actual content of the change. The user must open the file and search for the edit to verify what happened. This is the dominant verification friction across the marketplace and was called out as a system-wide issue spanning LSA, Core, and Helper.
      - **Example.** User 2026-05-22 (emphatic): *"LSA and Core and Helper have the same issue: they say 'I put something in a file...marked something in a file' and make the user to go and search for what it actually added - it takes forever to verify. … THAT IS TERRIBLE USER EXPERIENCE!"* Working positive template (same session): `lsa-reconcile`'s 8-element drift block — one-change-at-a-time, file location, current content quoted, proposed content quoted, evidence-rich reason, source attribution, bundle-explanation, type tag. User on that exemplar: *"Good! Love it!"*
      - **Expected Output.** Every skill that writes / edits / marks anything follows the order **write → show → comment**: the change is written, then the actual content is quoted inline (or compact diff for multi-line), then commentary follows. For batches too large to quote in full, use the compressed-inspection-table format (counts + per-row table + file:line pointers) — never a bare *"go check the file."* Likely landing surface: a new rule in `core/skills/output/SKILL.md` that subsumes this principle, plus skill-body sweeps across `lsa/skills/`, `helper/skills/`, and any Core skill that edits files.

      ### 6. Sweep custom inventions; remove the unjustified

      - **Problem.** LSA and Core have accumulated custom conventions (file naming, HTML-comment formats, internal state files, internal vocabulary) that are cheap to add individually but compound into a private dialect collaborators must learn. The just-shipped trace-tag removal (lsa v0.7.0, commit `c226623`) demonstrated one such invention had zero upstream mandate and was opaque to non-LSA readers.
      - **Example.** `<!-- revised: manual 2026-05-22 -->` — a trace tag — was unintelligible to the user's downstream collaborator. User principle 2026-05-22: *"We should find all such custom inventions and critically assess all of them asking the question 'Do we really need it? What would change if we remove it?' If nothing or minor - Remove."*
      - **Expected Output.** A sweep identifies every LSA / Core invention not required by an adopted 3rd-party standard (EARS, SemVer, Keep a Changelog, CommonMark, Claude Code plugin schema) or by Claude Code substrate. Each surveyed invention gets a decision: *keep* (with a one-line defense of its keep) or *remove* (with a PR). Initial candidates surfaced during the trace-tag removal (non-exhaustive — the sweep itself will surface more):
        - **`.lsa-sync-state.json`** — per-module last-sync SHA + ISO timestamp. The SHA is recoverable via `git log` against the module's spec file. Removal cost: `lsa-reconcile`'s baseline-SHA logic needs derivation from git history instead of file lookup.
        - **File-load trace directive** — every skill / knowledge file prints `=============== [<path>] [<plugin>] ===============` on load (core v0.5.4 / lsa v0.6.4 / helper v0.2.1). User-requested 2026-05-22. Assess: does the source-attribution payoff exceed the visual noise on every response?
        - **"Hard Confirm" / "Soft Confirm"** vocabulary in `lsa/knowledge/conventions.md` §"Confirm gate types". Skills could describe their gate behavior in plain English (*"approval required"* vs *"approve or correct inline"*) and lose the named-distinction overhead.

  - section: appendix-4
    content: |
      ## 2026-05-26 backlog detail

      `READY` — two backlog rows added 2026-05-26 from user brainstorm on missing roles in the marketplace.

      ### 1. `management` plugin — `product-manager` agent + `start-feature` skill

      - **Problem.** The marketplace has a strong *build* discipline (`lsa:discover` → `lsa:plan` → `lsa:implement` → `lsa:verify`) and a principal-engineer-level developer agent, but no *what to build* discipline. Today, work enters the system as a user-stated feature idea passed directly to `lsa:discover`. There is no structured step that shapes a vague problem or opportunity into a well-framed pitch — no appetite sizing, no explicit rabbit-hole identification, no "what we're NOT building" boundary. The user carries this entire burden mentally before typing a feature description.
      - **Example.** User 2026-05-26: *"I'm missing a principal project and product managers."* Current flow: user thinks of an idea → types it into `lsa:discover` → discovery asks clarifying questions. Missing: a shaping phase that takes a vague signal (*"users struggle with onboarding"*) and produces a pitch with problem, appetite, solution sketch, rabbit holes, and no-gos — before discovery begins specifying the solution.
      - **Inspiration.** Basecamp's Shape Up methodology — specifically the *shaping* phase that sits between raw requests and the build cycle. The `product-manager` agent is not a backlog groomer or a ticket writer; it is a shaping tool that produces a fixed-appetite pitch the human approves before committing to a build cycle. Source: [Basecamp — Shape Up: Shaping](https://basecamp.com/shapeup/1.1-chapter-02) [unverified — cited from training knowledge, not verified against the source page].
      - **Where it lives.** New standalone `management` plugin. Depends on `core` (ground-rules, output). Reads `lsa` artifacts (roadmap, specs, branches) but `lsa` does not depend on `management`. Separate concern from the build methodology — the `management` plugin owns "what to build" and "when to ship"; `lsa` owns "how to build." The plugin can grow to include a business analyst agent without bloating the build lifecycle.
      - **Expected Output.**
        - A **`management:start-feature` skill** that dispatches the `product-manager` agent.
        - A **pitch artifact** with fixed structure: Problem (who has it, evidence), Appetite (time/scope boundary — what we're willing to spend), Solution sketch (rough enough to direct, loose enough to allow design freedom), Rabbit holes (known complexities to call out up front), No-gos (what this pitch explicitly excludes).
        - A **human gate** between shaping and discovery — the user approves or reshapes the pitch before `lsa:discover` runs.
        - The `product-manager` agent reads codebase, existing specs, and roadmap to ground the pitch in reality — no greenfield fantasy.
        - Flow integration: `management:start-feature` → (human approves pitch) → `lsa:discover` → `lsa:plan` → `lsa:implement` → `lsa:verify`.
        - **Open question: `lsa:new` overlap.** `lsa:new` currently creates a branch and kicks off discovery. `management:start-feature` subsumes that — shaping + branch creation + handoff to `lsa:discover`. When `management` ships, `lsa:new` should either be removed or redirect to `management:start-feature`. Resolve during implementation.

      ### 2. `management` plugin — `project-manager` agent + `roadmap` skill

      - **Problem.** The marketplace manages features one at a time. There is no agent or skill that thinks across features — no dependency tracking between in-flight work, no risk flagging when scope creeps, no status snapshots for the human to review their overall progress, no sequencing reasoning ("feature B depends on feature A's data model, so A ships first"). The user carries the cross-feature mental model entirely in their head.
      - **Example.** User 2026-05-26: same session as #1. The roadmap file (`.lsa/roadmap.md`) is a static table maintained by hand — no agent reads it to flag stale items, identify blockers, or recommend what to pick next beyond `lsa:next`'s simple backlog-pop. When multiple features are in flight, there is no structured way to see "where are we across all of them."
      - **Where it lives.** Same `management` plugin as #1. Depends on `core`. Reads `lsa` artifacts and git state but does not require `lsa` to depend on it.
      - **Expected Output.**
        - A **`management:task-status` skill** that dispatches the `project-manager` agent.
        - A **status snapshot**: reads the roadmap, active feature branches, spec artifacts, and git history to produce a current-state summary — what's in flight, what's blocked, what's next, what's at risk.
        - A **dependency reasoning** capability: when the user starts a new feature, the `project-manager` flags if it depends on uncommitted work from another feature branch.
        - A **scope-watch** capability: during `lsa:plan` or `lsa:implement`, the `project-manager` can flag when an epic's actual scope exceeds the pitch's appetite (links to `product-manager` output).
        - A **sequencing recommendation**: given N backlog items, recommend an order based on dependencies, risk, and value — grounded in the roadmap and codebase state, not generic prioritization frameworks.
        - Integration with existing `lsa:next` — the `project-manager`'s sequencing recommendation informs which item `lsa:next` proposes.
      - **Future growth.** The `management` plugin is the natural home for a `business-analyst` agent if one is added later — same concern family (understanding the problem domain), same dependency pattern (reads `lsa` artifacts, depends on `core`).

  - section: appendix-5
    content: |
      ## 2026-05-27 backlog detail

      `READY` — four backlog rows added 2026-05-27 from a prompt audit (93 issues across 35 files). The audit report is the specification; each epic groups findings by severity and fix type. Epics are ordered by dependency: Epic 1 fixes broken references that block accurate reading of later files; Epic 2 enforces separation of concerns structurally; Epic 3 reduces duplication and context budget; Epic 4 polishes wording.

      ### 1. Prompt audit remediation — Epic 1: Fix broken cross-references and rewrite claude-dev

      - **Problem.** 10 cross-references across core, helper, and lsa point to paths, skill names, or rule counts that no longer exist — readers (human and agent) following these links hit dead ends. Separately, `.claude/agents/claude-dev.md` is missing all 5 required actor sections (Goal, Input, Steps, Output, Constraints) and inlines knowledge that already lives in `.claude/rules/plugin-development.md` and `CONTRIBUTING.md`.
      - **Priority.** P0 (**Must**). Broken references degrade every downstream prompt that loads these files. The claude-dev rewrite is bundled because it is the single worst-scoring file in the audit.
      - **Subtasks.**
        1. Fix spec paths `features/` → `archive/` in cross-references that cite archived feature specs (stale since the archive move).
        2. Fix skill name references: `lsa-reconcile` → `reconcile`, `lsa:specify` → `lsa:discover` (stale since lsa v0.8.0 rename).
        3. Fix stale rule count "five" → "seven" in `core/CLAUDE.md` or equivalent (core gained Rules 6 + 7 in v0.7.0 / v0.8.0).
        4. Create or fix missing memory file `feedback_askuserquestion_overuse.md` (referenced but absent).
        5. Rewrite `.claude/agents/claude-dev.md` from scratch using `core:actor-template`: add Goal, Input, Steps, Output, Constraints sections; remove inlined knowledge that duplicates `.claude/rules/plugin-development.md` and `CONTRIBUTING.md`; reference those files by path instead.
      - **Closes.** 17 HIGH + 4 MEDIUM severity findings.

      ### 2. Prompt audit remediation — Epic 2: Extract knowledge from actors (systemic SoC fix)

      - **Problem.** Three agents inline large blocks of rules and guidance that belong in knowledge files — violating the Knowledge/Actor separation principle (actors describe *how to act*; knowledge files describe *what is true*). This inflates context budget on every invocation and creates drift risk when the same rule is stated in two places.
      - **Priority.** P1 (**Should**). Structural fix that prevents the problem from recurring; enables Epic 3's DRY work.
      - **Subtasks.**
        1. Extract prompt-engineer agent rules (~100 lines of inline guidance) into `prompt-engineer/knowledge/` files; update the agent and its 3 commands (`prompt-review`, `prompt-optimize`, `prompt-create`) to reference the knowledge files by path.
        2. Remove restated knowledge from helper agent (`helper/agents/helper.md`); replace with path references to sibling knowledge files already in `helper/knowledge/`.
        3. Remove inline rule summaries from `management/agents/project-manager.md` Steps 4 and 9 (sequencing heuristics and epic decomposition rules); replace with path references to `management/knowledge/sequencing-heuristics.md` and `management/knowledge/epic-decomposition.md`.
      - **Closes.** 6 HIGH + 6 MEDIUM severity findings.

      ### 3. Prompt audit remediation — Epic 3: DRY + context budget cleanup

      - **Problem.** Several prompt files repeat the same boilerplate patterns (trace-file headers, constraint inheritance blocks, output format instructions), oversized phases bloat context windows, and two management skills overlap in roadmap-write authority.
      - **Priority.** P2 (Should). Reduces total token load across the plugin set; each subtask is independently shippable.
      - **Subtasks.**
        1. Expand `lsa/knowledge/conventions.md` to absorb 3 repeated boilerplate patterns (trace-file directive, constraint inheritance, output-format block); update all 9 LSA skills to cite the conventions file instead of restating.
        2. Split `lsa/skills/discover/SKILL.md` Phase 2 (currently inlines template content) into knowledge files or a separate skill for the templates.
        3. Trim `core/skills/output/SKILL.md` Rule 7 to 1 worked example; extract remaining examples to `core/resources/` or `core/knowledge/`.
        4. Resolve `management/skills/start-feature/SKILL.md` and `management/agents/project-manager.md` overlap on roadmap-write authority — one file should own the write, the other should delegate.
      - **Closes.** 2 HIGH + 9 MEDIUM + 3 LOW severity findings.

      ### 4. Prompt audit remediation — Epic 4: Polish (LOW severity)

      - **Problem.** ~30 low-severity wording and style issues across all plugins: formalized common sense rules (rules that restate what any competent agent would do), adverbs/hedging/passive voice, duplicated rename-history mentions, and low-density padding paragraphs.
      - **Priority.** P3 (Could). Individually minor; collectively they add ~500 tokens of noise to the prompt set. Deferrable without harm.
      - **Subtasks.**
        1. Remove formalized common sense rules: `core/output` Rules 1 and 3 (if they merely restate obvious behavior), `lsa/verify` checklist items that restate test-runner behavior, `management/roadmap` no-op step (if it produces no observable result).
        2. Fix wording issues: remove adverbs, hedging phrases, passive voice, and padding across all plugins (batch edit).
        3. Deduplicate rename-history mentions: `core/flow-selector` tier-to-flow rename is repeated 4 times across the prompt set; consolidate to 1 authoritative mention + path references.
        4. Remove low-density padding: `core/output` inheritance section preamble, `core/ground-rules` opening paragraph, and similar blocks where the token cost exceeds the information content.

  - section: appendix-6
    content: |
      ## 2026-05-28 backlog detail — Pitch 3: enforce-show-changes-inline

      `READY` — four epics added 2026-05-28 from Pitch 3 (`.lsa/pitches/enforce-show-changes-inline.md`). The pitch is the specification; each epic delivers one component. Epics are ordered by dependency: Epic 1 installs the canonical pointer that Epics 2-4 cite back to; Epic 2 ships the user-visible critical fix (per-skill sweep); Epics 3 and 4 add author-time and PR-time regression checks respectively (both surfaces preserved per Q4 decision recorded in the pitch).

      ### 1. Enforce show-changes-inline — Epic 1: `core/output` Rule 7 "How this gets enforced" sub-section

      - **Problem.** `core/output` Rule 7 (show-changes-inline) is documented as canonical but carries no enforcement pointer — skills citing Rule 7 have nowhere to look for (a) where the rule applies per-step, (b) the regression checks shipping in Epics 3 and 4, or (c) a gold-standard exemplar. Without this anchor, Epic 2's per-skill sweep has no canonical reference to cite back to.
      - **Priority.** P0 (**Must**). Installs the canonical pointer that Epics 2-4 cite back to; blocks them.
      - **Subtasks.**
        1. Add "How this gets enforced" sub-section to `core/skills/output/SKILL.md` Rule 7 pointing to (a) per-skill cite locations, (b) the two regression checks shipping in Epics 3 and 4 (prompt-review for prompt sources; lsa:verify for runtime artifacts), and (c) `lsa/skills/reconcile/SKILL.md` 8-element drift block as the gold-standard exemplar (user-endorsed 2026-05-22, per memory `feedback_lsa_reconcile_gold_standard.md`).
        2. Update `core/CLAUDE.md` operational checkpoint to reference the new sub-section.
        3. Quote the changes inline per Rule 7's own format (dogfooding).
        4. Bump `core` SemVer + CHANGELOG entry.
      - **Covers.** Pitch task #1.

      ### 2. Enforce show-changes-inline — Epic 2: Per-skill show-changes sweep across LSA / Management / Helper / Core / prompt-engineer

      - **Problem.** Skills across LSA / Management / Helper / Core / prompt-engineer describe write/edit/mark actions in their step bodies without an explicit "quote the change inline" directive — relying on `core/output` Rule 7 to be enforced ambiently. In practice, agents miss the rule, and the user has flagged this complaint twice (memory: `feedback_show_actual_changes.md`). Per-skill enforcement at the step-body level is needed.
      - **Priority.** P0 (**Must**). The user-visible critical fix; ships the actual behavior change.
      - **Subtasks.**
        1. LSA sweep: every step in `lsa/skills/**` that writes/edits/marks gets an explicit "quote the change inline" directive in the step body (not only in `Observable result`).
        2. Management sweep: same treatment for `management/skills/**` + `management/agents/**`.
        3. Helper sweep: same for `helper/agents/helper.md` (folds in deferred Helper-side work from v0.8.0 per pitch §"Open questions" #1).
        4. Core sweep: same for any step in `core/skills/**` that writes/marks.
        5. prompt-engineer sweep: same for `prompt-engineer/**`.
        6. Bump per-plugin SemVer + CHANGELOG. Chunked into independent per-plugin PRs per pitch §"Rabbit holes" #3.
      - **Covers.** Pitch task #2.

      ### 3. Enforce show-changes-inline — Epic 3: Author-time regression check in `prompt-engineer:prompt-review`

      - **Problem.** Even after Epic 2's sweep, newly authored skill/agent prompts can be written that violate the show-changes rule. Without an author-time scan, the rule will drift over time. Per Q4, the right home for source-level checking is `prompt-engineer:prompt-review` (catches violations in prompt sources before they ship).
      - **Priority.** P1 (Should). Prevents regression; not a user-visible behavior change.
      - **Subtasks.**
        1. Add a scan to `prompt-engineer/skills/prompt-review/SKILL.md` over `**/SKILL.md` + `**/agents/*.md` for steps describing write/edit/mark actions without a show-changes-inline directive.
        2. Warning-only output (not blocking) — author decides per case.
        3. Validate against one positive baseline (a post-v0.8.0 compliant skill source) and one negative baseline (a pre-v0.8.0 prompt-source diff) per pitch §"Open questions" #2.
        4. Bump `prompt-engineer` SemVer + CHANGELOG.
      - **Covers.** Pitch task #3 (+ pitch task #5 baseline validation folded in).

      ### 4. Enforce show-changes-inline — Epic 4: PR-time regression check in `lsa:verify`

      - **Problem.** Skill bodies may comply post-Epic 2, but runtime outputs (verification reports, PR descriptions) can still contain "go check the file" patterns generated at execution time. Per Q4, the right home for runtime checking is `lsa:verify` (catches violations in runtime artifacts at PR time).
      - **Priority.** P1 (Should). Prevents regression at the output side; complements Epic 3.
      - **Subtasks.**
        1. Add a scan to `lsa/skills/verify/SKILL.md` over the feature's runtime outputs / PR diff for banned phrasings without inline quote: "go check the file", "I added X to Y" without quote, "marked X", "updated Z" without quote.
        2. Warning-only output.
        3. Validate against one positive baseline (a recent post-v0.8.0 compliant PR) and one negative baseline per pitch §"Open questions" #2.
        4. Bump `lsa` SemVer + CHANGELOG.
      - **Covers.** Pitch task #4 (+ pitch task #5 baseline validation folded in).

